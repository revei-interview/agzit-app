<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Scorecard — AGZIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:      #09101F;
  --soft:     #3A4163;
  --muted:    #7C83A0;
  --line:     #E4E6EF;
  --surface:  #F5F6FA;
  --blue:     #1A44C2;
  --blue-lt:  #EAF0FF;
  --green:    #0B7A47;
  --green-lt: #E4F5EE;
  --amber:    #B45309;
  --amber-lt: #FEF3C7;
  --purple:   #6D28D9;
  --purple-lt:#EDE9FE;
  --red:      #B91C1C;
  --red-lt:   #FEE2E2;
}
html { font-size: 16px; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Loading ── */
#loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 14px; }
.spin { width: 36px; height: 36px; border: 3px solid var(--line); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-label { font-size: 13px; color: var(--muted); font-weight: 600; }

/* ── Error ── */
#error-state { max-width: 520px; margin: 80px auto; padding: 32px; background: #fff; border: 1px solid var(--line); border-radius: 16px; text-align: center; }
#error-state h2 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
#error-state p  { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* ── Main ── */
#main { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── Back bar ── */
.back-bar { margin-bottom: 20px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
  color: var(--soft); background: #fff; border: 1px solid var(--line); border-radius: 9px;
  padding: 7px 14px; cursor: pointer; text-decoration: none;
  transition: background .15s, color .15s;
}
.back-btn:hover { background: var(--surface); color: var(--blue); text-decoration: none; }
.back-arrow { font-size: 16px; line-height: 1; }

/* ── Session header card ── */
.session-card {
  background: #fff; border: 1px solid var(--line); border-radius: 16px;
  padding: 22px 24px; margin-bottom: 16px;
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}
.session-role { font-size: 20px; font-weight: 800; color: var(--ink); margin-bottom: 5px; }
.session-candidate { font-size: 14px; font-weight: 700; color: var(--blue); margin-bottom: 10px; }
.session-meta { display: flex; flex-wrap: wrap; gap: 12px; }
.session-meta-item { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.session-meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--line); flex-shrink: 0; }
.status-badge {
  display: inline-block; padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.status-completed { background: #F0FDF4; color: #15803D; }
.status-scheduled { background: #EFF6FF; color: #1D4ED8; }
.status-started   { background: #FFFBEB; color: #B45309; }
.status-cancelled { background: #FEF2F2; color: #B91C1C; }

/* ── Score overview ── */
.score-overview {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;
}
.score-card {
  background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 22px 24px;
  display: flex; align-items: center; gap: 20px;
}
.score-ring-wrap { flex-shrink: 0; position: relative; width: 80px; height: 80px; }
.score-ring-wrap svg { transform: rotate(-90deg); }
.score-ring-bg  { fill: none; stroke: var(--line); stroke-width: 7; }
.score-ring-fg  { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
.score-number {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: var(--ink);
}
.score-number sub { font-size: 11px; font-weight: 600; color: var(--muted); }
.score-info { flex: 1; min-width: 0; }
.score-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.score-perf-badge {
  display: inline-block; padding: 5px 13px; border-radius: 999px;
  font-size: 12.5px; font-weight: 800; margin-bottom: 6px;
}
.score-sub { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

.readiness-card {
  background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 22px 24px;
}
.readiness-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
.readiness-band {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-radius: 10px;
  font-size: 15px; font-weight: 800; margin-bottom: 12px;
}
.band-strong_match { background: #DCFCE7; color: #15803D; }
.band-promising    { background: #DBEAFE; color: #1D4ED8; }
.band-developing   { background: #FEF3C7; color: #B45309; }
.band-not_ready    { background: #FEE2E2; color: #B91C1C; }

/* ── Section card ── */
.section-card {
  background: #fff; border: 1px solid var(--line); border-radius: 16px;
  padding: 22px 24px; margin-bottom: 16px;
}
.section-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
}
.section-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
.section-bar-blue   { background: linear-gradient(180deg, var(--blue), rgba(26,68,194,.28)); }
.section-bar-green  { background: linear-gradient(180deg, var(--green), rgba(11,122,71,.28)); }
.section-bar-amber  { background: linear-gradient(180deg, var(--amber), rgba(180,83,9,.28)); }
.section-bar-purple { background: linear-gradient(180deg, var(--purple), rgba(109,40,217,.28)); }
.section-bar-red    { background: linear-gradient(180deg, var(--red), rgba(185,28,28,.28)); }
.section-title { font-size: 15px; font-weight: 800; color: var(--ink); }
.section-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

/* ── 9 competency grid ── */
.comp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.comp-item {
  background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px;
}
.comp-name  { font-size: 11.5px; font-weight: 700; color: var(--soft); margin-bottom: 10px; line-height: 1.4; }
.comp-score-row { display: flex; align-items: center; gap: 10px; }
.comp-bar-wrap { flex: 1; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
.comp-bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.comp-num  { font-size: 15px; font-weight: 800; color: var(--ink); min-width: 24px; text-align: right; }
.comp-denom { font-size: 11px; color: var(--muted); font-weight: 600; }

/* ── Feedback cards ── */
.feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.feedback-card { border-radius: 14px; padding: 18px 20px; border: 1px solid; }
.fb-green  { background: var(--green-lt); border-color: #A7F3D0; }
.fb-blue   { background: var(--blue-lt);  border-color: #BFDBFE; }
.fb-purple { background: var(--purple-lt); border-color: #C4B5FD; }
.fb-amber  { background: var(--amber-lt); border-color: #FCD34D; }
.fb-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.fb-green  .fb-label { color: var(--green); }
.fb-blue   .fb-label { color: var(--blue); }
.fb-purple .fb-label { color: var(--purple); }
.fb-amber  .fb-label { color: var(--amber); }
.fb-text { font-size: 13px; line-height: 1.75; color: var(--ink); }
.fb-text li { margin-bottom: 5px; }

/* ── Employer intelligence ── */
.intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.intel-card { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
.intel-head { font-size: 13px; font-weight: 800; color: var(--ink); margin-bottom: 12px; }
.intel-sub  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 6px; margin-top: 12px; }
.intel-text { font-size: 12.5px; line-height: 1.75; color: var(--soft); }

/* ── Recording ── */
.recording-row { display: flex; gap: 12px; flex-wrap: wrap; }
.rec-btn {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 700; text-decoration: none;
  transition: opacity .15s;
}
.rec-btn:hover { opacity: .85; text-decoration: none; }
.rec-btn.secondary { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
.rec-btn.secondary:hover { background: #E8EAF2; }

/* ── Responsive ── */
@media (max-width: 700px) {
  .score-overview  { grid-template-columns: 1fr; }
  .comp-grid       { grid-template-columns: repeat(2, 1fr); }
  .feedback-grid   { grid-template-columns: 1fr; }
  .intel-grid      { grid-template-columns: 1fr; }
  #main            { padding: 20px 14px 48px; }
}
@media (max-width: 420px) {
  .comp-grid { grid-template-columns: 1fr; }
}
</style>
<script src="/assets/layout.js" defer></script>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-label">Loading scorecard...</div>
</div>

<div id="error-state" style="display:none">
  <h2 id="err-title">Scorecard Not Found</h2>
  <p id="err-msg">This interview may have been removed or you do not have access.</p>
  <br>
  <a href="/employer" style="font-size:13px;font-weight:700;color:var(--blue);">← Back to Dashboard</a>
</div>

<div id="main" style="display:none">
  <div class="back-bar">
    <a class="back-btn" href="/employer">
      <span class="back-arrow">←</span> Back to Dashboard
    </a>
  </div>

  <!-- Session header -->
  <div class="session-card" id="session-header"></div>

  <!-- Score overview -->
  <div class="score-overview" id="score-overview"></div>

  <!-- 9 Competency scores -->
  <div class="section-card" id="comp-section" style="display:none">
    <div class="section-head">
      <span class="section-bar section-bar-blue"></span>
      <span class="section-title">Competency Breakdown</span>
      <span class="section-sub">0–10 per dimension</span>
    </div>
    <div class="comp-grid" id="comp-grid"></div>
  </div>

  <!-- Feedback cards -->
  <div id="feedback-section" style="display:none">
    <div class="feedback-grid" id="feedback-grid"></div>
    <!-- next-focus spans full width -->
    <div id="next-focus-card" style="margin-bottom:16px;display:none"></div>
  </div>

  <!-- Employer intelligence -->
  <div class="section-card" id="intel-section" style="display:none">
    <div class="section-head">
      <span class="section-bar section-bar-amber"></span>
      <span class="section-title">Employer Intelligence</span>
    </div>
    <div class="intel-grid" id="intel-grid"></div>
  </div>

  <!-- Recording -->
  <div class="section-card" id="recording-section" style="display:none">
    <div class="section-head">
      <span class="section-bar section-bar-purple"></span>
      <span class="section-title">Session Recording</span>
    </div>
    <div class="recording-row" id="recording-row"></div>
  </div>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────
function el(id)  { return document.getElementById(id); }
function show(e) { if(e) e.style.display = ''; }
function hide(e) { if(e) e.style.display = 'none'; }
function esc(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d.getTime())) return String(s);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function titleCase(s) {
  return String(s || '').replace(/[_\-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// Render a bullet-point text field (split by \n or •)
function renderBullets(text) {
  if (!text) return '';
  const lines = String(text).split(/\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return '';
  return '<ul style="list-style:none;display:grid;gap:5px;">' +
    lines.map(l => `<li style="display:flex;gap:8px;align-items:flex-start;"><span style="flex-shrink:0;margin-top:5px;">&#9679;</span><span>${esc(l.replace(/^[•\-\*]\s*/,''))}</span></li>`).join('') +
    '</ul>';
}

function renderProse(text) {
  if (!text) return '';
  return '<p style="font-size:13px;line-height:1.8;color:var(--soft);">' + esc(String(text)).replace(/\n/g, '<br>') + '</p>';
}

// Score colour by value 0–10
function scoreColor(v) {
  if (v === null) return '#CBD5E1';
  if (v >= 8) return '#22C55E';
  if (v >= 6) return '#3B82F6';
  if (v >= 4) return '#F59E0B';
  return '#EF4444';
}

// Overall score ring colour 0–100
function ringColor(v) {
  if (v === null) return '#CBD5E1';
  if (v >= 75) return '#22C55E';
  if (v >= 60) return '#3B82F6';
  if (v >= 50) return '#F59E0B';
  return '#EF4444';
}

// Performance level badge colours (5-band candidate scale)
const PERF_COLORS = {
  'Interview Ready':           { bg:'#DCFCE7', bd:'#86EFAC', tx:'#166534' },
  'Strong Potential':          { bg:'#DBEAFE', bd:'#93C5FD', tx:'#1D4ED8' },
  'Developing Professional':   { bg:'#CCFBF1', bd:'#5EEAD4', tx:'#0F766E' },
  'Needs Structured Practice': { bg:'#FEF3C7', bd:'#FCD34D', tx:'#92400E' },
  'Foundation Level':          { bg:'#FEE2E2', bd:'#FCA5A5', tx:'#991B1B' },
};
function perfBadge(level) {
  const c = PERF_COLORS[level] || { bg:'#F1F5F9', bd:'#CBD5E1', tx:'#475569' };
  return `<span class="score-perf-badge" style="background:${c.bg};border:1px solid ${c.bd};color:${c.tx};">${esc(level)}</span>`;
}

const BAND_LABELS = { strong_match: 'Strong Match', promising: 'Promising', developing: 'Developing', not_ready: 'Not Ready' };
function bandBadge(band) {
  const cls = 'readiness-band band-' + (band || '');
  return `<div class="${cls}">${esc(BAND_LABELS[band] || titleCase(band))}</div>`;
}

function statusBadge(s) {
  const labels = { completed:'Completed', scheduled:'Scheduled', started:'In Progress', cancelled:'Cancelled' };
  const cls = 'status-badge status-' + (s || 'scheduled');
  return `<span class="${cls}">${labels[s] || s || 'Scheduled'}</span>`;
}

// SVG score ring (80x80)
function scoreRing(score, maxScore) {
  const r = 34; const c = 40;
  const circ = 2 * Math.PI * r;
  const pct  = maxScore > 0 ? Math.min(1, (score ?? 0) / maxScore) : 0;
  const dash  = circ;
  const offset = circ * (1 - pct);
  const color = ringColor(score);
  return `<svg width="80" height="80" viewBox="0 0 80 80">
    <circle class="score-ring-bg" cx="${c}" cy="${c}" r="${r}"/>
    <circle class="score-ring-fg" cx="${c}" cy="${c}" r="${r}"
      stroke="${color}" stroke-dasharray="${dash}" stroke-dashoffset="${offset}"/>
  </svg>
  <div class="score-number">${score ?? '--'}<sub>/${maxScore}</sub></div>`;
}

// ── Render functions ────────────────────────────────────────────────────────────

function renderSessionHeader(iv) {
  const statusHtml = statusBadge(iv.interview_status);
  const date = iv.scheduled_at || (iv.interview_started_at ? fmtDate(iv.interview_started_at * 1000) : '') || (iv.post_date ? fmtDate(iv.post_date) : '');
  el('session-header').innerHTML = `
    <div>
      <div class="session-role">${esc(iv.interview_role || 'Interview')}</div>
      <div class="session-candidate">${esc(iv.candidate_name || 'Candidate')}</div>
      <div class="session-meta">
        ${date ? `<span class="session-meta-item">${esc(date)}</span>` : ''}
        ${iv.session_type ? `<span class="session-meta-item"><span class="session-meta-dot"></span>${esc(iv.session_type)}</span>` : ''}
        ${iv.total_work_experience ? `<span class="session-meta-item"><span class="session-meta-dot"></span>${esc(iv.total_work_experience)} yrs exp</span>` : ''}
      </div>
    </div>
    <div style="flex-shrink:0;">${statusHtml}</div>`;
}

function renderScoreOverview(iv) {
  const hasScore = iv.mock_overall_score !== null;
  const hasBand  = !!iv.emp_readiness_band;

  let html = '';

  // Left: overall score ring + performance level
  html += `<div class="score-card">
    <div class="score-ring-wrap">${scoreRing(iv.mock_overall_score, 100)}</div>
    <div class="score-info">
      <div class="score-label">Overall Score</div>
      ${iv.mock_performance_level ? perfBadge(iv.mock_performance_level) : ''}
      <div class="score-sub">AI-assessed mock interview performance.</div>
    </div>
  </div>`;

  // Right: employer readiness band
  html += `<div class="readiness-card">
    <div class="readiness-label">Employer Readiness</div>
    ${hasBand ? bandBadge(iv.emp_readiness_band) : '<div style="color:var(--muted);font-size:13px;">Not assessed yet</div>'}
    ${!hasScore ? '<div style="font-size:12.5px;color:var(--muted);margin-top:8px;">Scorecard will be available once the interview is completed.</div>' : ''}
  </div>`;

  el('score-overview').innerHTML = html;
}

function renderCompetencies(iv) {
  const comps = [
    { key: 'score_communication',        label: 'Communication Clarity' },
    { key: 'score_structure',            label: 'Answer Structure' },
    { key: 'score_role_knowledge',       label: 'Role Knowledge' },
    { key: 'score_domain_application',   label: 'Domain Application' },
    { key: 'score_problem_solving',      label: 'Problem Solving' },
    { key: 'score_confidence',           label: 'Confidence & Presence' },
    { key: 'score_question_handling',    label: 'Question Handling' },
    { key: 'score_experience_relevance', label: 'Experience Relevance' },
    { key: 'score_resume_alignment',     label: 'Resume Alignment' },
  ];

  const hasAny = comps.some(c => iv[c.key] !== null);
  if (!hasAny) return;

  el('comp-grid').innerHTML = comps.map(c => {
    const v = iv[c.key];
    const pct = v !== null ? (v / 10 * 100) : 0;
    const color = scoreColor(v);
    return `<div class="comp-item">
      <div class="comp-name">${esc(c.label)}</div>
      <div class="comp-score-row">
        <div class="comp-bar-wrap"><div class="comp-bar-fill" style="width:${pct}%;background:${color};"></div></div>
        <span class="comp-num">${v ?? '–'}</span><span class="comp-denom">/10</span>
      </div>
    </div>`;
  }).join('');

  show(el('comp-section'));
}

function renderFeedback(iv) {
  const pairs = [
    { key: 'mock_strengths',     cls: 'fb-green',  label: 'Strengths' },
    { key: 'mock_improvements',  cls: 'fb-blue',   label: 'Areas to Improve' },
    { key: 'mock_attention_areas', cls: 'fb-amber', label: 'Attention Areas' },
  ];

  const gridCards = pairs.filter(p => iv[p.key]);
  const hasFocus  = !!iv.mock_next_focus;
  const hasFeedback = gridCards.length > 0 || hasFocus;

  if (!hasFeedback) return;

  el('feedback-grid').innerHTML = gridCards.map(p => `
    <div class="feedback-card ${p.cls}">
      <div class="fb-label">${esc(p.label)}</div>
      <div class="fb-text">${renderBullets(iv[p.key])}</div>
    </div>`).join('');

  if (hasFocus) {
    el('next-focus-card').innerHTML = `
      <div class="feedback-card fb-purple" style="margin:0;">
        <div class="fb-label">Next Focus</div>
        <div class="fb-text">${renderProse(iv.mock_next_focus)}</div>
      </div>`;
    show(el('next-focus-card'));
  }

  show(el('feedback-section'));
}

function renderIntelligence(iv) {
  const hasStrengths  = !!iv.emp_role_strengths;
  const hasGaps       = !!iv.emp_role_gaps;
  const hasRedFlags   = !!iv.emp_red_flags;
  const hasConsistency = !!iv.emp_consistency_check;

  if (!hasStrengths && !hasGaps && !hasRedFlags && !hasConsistency) return;

  let left = '';
  if (hasStrengths) {
    left += `<div class="intel-sub" style="color:var(--green);margin-top:0;">Role Strengths</div>
      <div class="intel-text">${renderBullets(iv.emp_role_strengths)}</div>`;
  }
  if (hasGaps) {
    left += `<div class="intel-sub">Role Gaps</div>
      <div class="intel-text">${renderBullets(iv.emp_role_gaps)}</div>`;
  }

  let right = '';
  if (hasConsistency) {
    right += `<div class="intel-sub" style="margin-top:0;">Consistency Check</div>
      <div class="intel-text">${renderProse(iv.emp_consistency_check)}</div>`;
  }
  if (hasRedFlags) {
    right += `<div class="intel-sub" style="color:var(--red);">Red Flags</div>
      <div class="intel-text">${renderBullets(iv.emp_red_flags)}</div>`;
  }

  el('intel-grid').innerHTML =
    (left  ? `<div class="intel-card"><div class="intel-head">Candidate Assessment</div>${left}</div>`  : '') +
    (right ? `<div class="intel-card"><div class="intel-head">Risk & Consistency</div>${right}</div>` : '');

  show(el('intel-section'));
}

function renderRecording(iv) {
  let html = '';
  if (iv.audio_url) {
    html += `<a class="rec-btn" href="${esc(iv.audio_url)}" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-2 13V8l7 4-7 4z"/></svg>
      Play Audio
    </a>`;
  }
  if (iv.video_url) {
    html += `<a class="rec-btn" href="${esc(iv.video_url)}" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 7.5l-6 4.5 6 4.5V7.5zM10 8H4v8h6V8z"/></svg>
      View Video
    </a>`;
  }
  if (iv.resume_file) {
    html += `<a class="rec-btn secondary" href="${esc(iv.resume_file)}" target="_blank" rel="noopener noreferrer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Resume
    </a>`;
  }
  if (!html) return;
  el('recording-row').innerHTML = html;
  show(el('recording-section'));
}

// ── Boot ────────────────────────────────────────────────────────────────────────

(async function boot() {
  const params = new URLSearchParams(location.search);
  const id     = params.get('id') || '';

  if (!id || isNaN(parseInt(id))) {
    hide(el('loading'));
    el('err-title').textContent = 'No interview ID provided';
    el('err-msg').textContent   = 'Add ?id=INTERVIEW_ID to the URL.';
    show(el('error-state'));
    return;
  }

  try {
    const res  = await fetch('/api/employer/interviews/' + encodeURIComponent(id), { credentials: 'include' });
    const data = await res.json();

    if (!res.ok || !data.ok) {
      hide(el('loading'));
      el('err-title').textContent = data.error || 'Interview not found';
      show(el('error-state'));
      return;
    }

    const iv = data.interview;
    document.title = `${iv.interview_role || 'Interview'} — ${iv.candidate_name || 'Scorecard'} — AGZIT`;

    renderSessionHeader(iv);
    renderScoreOverview(iv);
    renderCompetencies(iv);
    renderFeedback(iv);
    renderIntelligence(iv);
    renderRecording(iv);

    hide(el('loading'));
    show(el('main'));

  } catch (err) {
    hide(el('loading'));
    el('err-title').textContent = 'Could not load scorecard';
    el('err-msg').textContent   = 'Please try again later.';
    show(el('error-state'));
    console.error('[employer-scorecard]', err);
  }
})();
</script>
</body>
</html>
