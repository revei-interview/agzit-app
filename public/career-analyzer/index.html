<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Analyzer | AGZIT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface, #F5F6FA); color: var(--ink, #09101F); }

    .page { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 28px; margin-bottom: 8px; color: var(--ink); }
    .header p { color: var(--soft, #3A4163); }

    .loading { text-align: center; padding: 60px 20px; }
    .loading p { color: var(--muted, #7C83A0); margin: 10px 0; }
    .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid var(--line, #E4E6EF); border-top: 4px solid var(--blue, #1A44C2); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .error { background: #FFEBEE; border: 1px solid #EF5350; padding: 20px; border-radius: 8px; color: #C62828; text-align: center; }

    .paths { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; margin-bottom: 40px; }

    .path-card {
      background: white;
      border: 1px solid var(--line, #E4E6EF);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .path-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-4px);
    }

    .path-num { display: inline-block; width: 36px; height: 36px; background: var(--blue, #1A44C2); color: white; border-radius: 50%; text-align: center; line-height: 36px; font-weight: 600; margin-bottom: 12px; }
    .path-title { font-size: 20px; font-weight: 600; margin: 12px 0; color: var(--ink); }

    .meta { display: flex; gap: 20px; margin: 16px 0; font-size: 14px; color: var(--soft, #3A4163); flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 6px; }

    .section { margin: 16px 0; }
    .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--ink); margin-bottom: 8px; }

    .fit-box { background: var(--blue-lt, #EAF0FF); padding: 16px; border-radius: 8px; font-size: 14px; color: var(--blue, #1A44C2); line-height: 1.6; margin: 12px 0; }

    .skills { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill { background: var(--line, #E4E6EF); color: var(--soft, #3A4163); padding: 6px 12px; border-radius: 16px; font-size: 13px; }

    .salary { font-size: 14px; color: var(--ink); font-weight: 500; margin: 12px 0; }
    .balance-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .balance-balanced { background: #E8F5E9; color: #2E7D32; }
    .balance-demanding { background: #FFF3E0; color: #F57C00; }
    .balance-flexible { background: #E1F5FE; color: #0277BD; }

    .steps { background: var(--surface, #F5F6FA); padding: 16px; border-radius: 8px; font-size: 13px; }
    .steps ol { margin: 8px 0 0 20px; color: var(--soft, #3A4163); line-height: 1.6; }
    .steps li { margin-bottom: 6px; }

    .insights { background: linear-gradient(135deg, var(--green-lt, #E4F5EE) 0%, #E8F5E9 100%); border: 1px solid var(--green, #0B7A47); padding: 24px; border-radius: 12px; margin-top: 40px; }
    .insights h3 { color: var(--green, #0B7A47); margin-bottom: 12px; font-weight: 600; }
    .insights p { color: var(--ink, #09101F); line-height: 1.6; }

    .gaps { margin-top: 40px; }
    .gaps h3 { color: var(--ink, #09101F); margin-bottom: 16px; font-weight: 600; }
    .gaps ul { margin-left: 20px; color: var(--soft, #3A4163); line-height: 1.8; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Your Career Analyzer Report</h1>
      <p>Discover 3 strategic career paths with salary growth insights</p>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Analyzing your profile with AI...</p>
      <p style="font-size: 12px; color: var(--muted);">This may take 30 seconds</p>
    </div>

    <div id="content" style="display: none;">
      <div id="error"></div>
      <div id="paths" class="paths"></div>
      <div id="insights" class="insights" style="display: none;">
        <h3>Overall Insights</h3>
        <p id="insights-text"></p>
      </div>
      <div id="gaps" class="gaps" style="display: none;">
        <h3>Skill Gaps to Address</h3>
        <ul id="gaps-list"></ul>
      </div>
    </div>
  </div>

  <script>
    async function loadReport() {
      try {
        const res = await fetch('/api/candidate/career-analyzer', {
          method: 'POST',
          credentials: 'include'
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        render(data.report);
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('error').innerHTML = `<div class="error"><strong>Error:</strong> ${error.message}</div>`;
      }
    }

    function render(report) {
      const pathsHtml = (report.paths || []).map((p, i) => `
        <div class="path-card">
          <div class="path-num">${i + 1}</div>
          <h3 class="path-title">${p.role_title || p.role || ''}</h3>

          <div class="meta">
            <div class="meta-item">Timeline: ${p.timeline_months || '?'} months</div>
            <div class="meta-item">Salary: ${p.salary_range || 'N/A'}</div>
            <div class="meta-item"><span class="balance-badge balance-${(p.work_life_balance || 'balanced').toLowerCase()}">${p.work_life_balance || 'Balanced'}</span></div>
          </div>

          <div class="fit-box">
            <strong>Why it's a good fit:</strong><br>
            ${p.fit_reason || p.why_good_fit || ''}
          </div>

          <div class="section">
            <div class="section-title">Required Skills</div>
            <div class="skills">
              ${(p.required_skills || []).map(s => `<span class="skill">${s}</span>`).join('')}
            </div>
          </div>

          <div class="salary">
            <strong>Expected Range:</strong> ${p.salary_range || 'N/A'}
          </div>

          <div class="section">
            <div class="section-title">Industries</div>
            <p style="font-size: 13px; color: var(--soft, #3A4163);">${(p.industries || []).join(', ')}</p>
          </div>

          <div class="section">
            <div class="section-title">When to Switch</div>
            <p style="font-size: 13px; color: var(--soft, #3A4163);">${p.timing_strategy || p.switch_timing || 'Strategic timing depends on current role stability'}</p>
          </div>

          <div class="section">
            <div class="section-title">Risk Factors</div>
            <p style="font-size: 13px; color: var(--soft, #3A4163);">${(p.risks || p.risk_factors || ['Minimal risk with proper preparation']).join ? (p.risks || p.risk_factors || []).join(', ') : (p.risks || p.risk_factors || 'Minimal risk')}</p>
          </div>

          <div class="steps">
            <strong style="color: var(--ink);">Next Steps:</strong>
            <ol>
              ${(p.next_actions || p.next_steps || []).map(s => `<li>${s}</li>`).join('')}
            </ol>
          </div>
        </div>
      `).join('');

      document.getElementById('paths').innerHTML = pathsHtml;

      if (report.overall_insights) {
        document.getElementById('insights').style.display = 'block';
        document.getElementById('insights-text').textContent = report.overall_insights;
      }

      if (report.skill_gaps && report.skill_gaps.length) {
        document.getElementById('gaps').style.display = 'block';
        document.getElementById('gaps-list').innerHTML = report.skill_gaps.map(g => `<li>${g}</li>`).join('');
      }
    }

    window.addEventListener('load', loadReport);
  </script>
</body>
</html>
